principles:
  - title: "Global Standards,<br>Local Excellence"
    text: "We operate internationally while leveraging Italy's exceptional research talent and engineering culture."
  
  - title: "Long-term<br>Vision"
    text: "We build systems meant to last in a fast-changing AI landscape."
  
  - title: "Depth before<br>Scale"
    text: "We prioritize technical depth, scientific integrity and precision before pursuing rapid expansion."
  
  - title: "Adaptive<br>Innovation"
    text: "We evolve with the AI landscape, combining diverse expertise to explore new paradigms — from robotics and embodied AI to advanced language and multimodal foundation models, and beyond."
  
  - title: "Technology<br>Transfer"
    text: "We work side by side with industry and research teams, co-designing solutions, sharing knowledge, and building systems together from concept to deployment."
  
  - title: "Sustainable<br>Growth"
    text: "We build responsibly, focusing on long-term value and meaningful technological impact."